<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音高对齐测试 - 与项目系统一致</title>
    <script src="frontend/node_modules/chart.js/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        .chart-section {
            background: rgba(20, 30, 60, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-panel, .log-panel, .data-panel {
            background: rgba(20, 30, 60, 0.9);
            border: 2px solid #00ffcc;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 50px;
        }
        .btn-record-ref {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .btn-record-ref:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .btn-record-ref.recording {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            animation: pulse 1s infinite;
        }
        .btn-sing {
            background: linear-gradient(135deg, #00ffcc, #00cc99);
            color: #0f0c29;
        }
        .btn-sing:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        }
        .btn-sing.singing {
            background: linear-gradient(135deg, #ffd93d, #ff9500);
            animation: pulse 1s infinite;
        }
        .btn-stop {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }
        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        .btn-export {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
        }
        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4);
        }
        .btn-clear {
            background: #4a5568;
            color: #fff;
        }
        .btn-clear:hover {
            background: #718096;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4a5568;
        }
        .status-dot.recording { background: #ff6b6b; animation: pulse 1s infinite; }
        .status-dot.singing { background: #00ffcc; animation: pulse 1s infinite; }
        .status-dot.ready { background: #22c55e; }
        .status-dot.ws-connected { background: #00d4ff; animation: pulse 1s infinite; }
        .chart-wrapper {
            height: 400px;
            position: relative;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .log-panel {
            max-height: 400px;
            overflow-y: auto;
        }
        .log-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #00ffcc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .frame-log {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            border-collapse: collapse;
            width: 100%;
        }
        .frame-log tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .frame-log th {
            text-align: left;
            padding: 8px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }
        .frame-log td {
            padding: 6px 8px;
            font-size: 11px;
        }
        .frame-log .ref-pitch { color: #22c55e; }
        .frame-log .user-pitch { color: #ef4444; }
        .frame-log .cents-diff { color: #ffd93d; }
        .frame-log .match { color: #22c55e; }
        .frame-log .mismatch { color: #ef4444; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-value.green { color: #22c55e; }
        .stat-value.red { color: #ef4444; }
        .stat-value.yellow { color: #ffd93d; }
        .data-panel {
            max-height: 300px;
            overflow-y: auto;
        }
        .data-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #a855f7;
        }
        .data-preview {
            font-family: 'Consolas', monospace;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }
        .legend-color.ref { background: #22c55e; }
        .legend-color.user { background: #ef4444; }
        .ws-status {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 音高对齐测试 - 与项目系统一致</h1>
        
        <div class="main-grid">
            <div class="chart-section">
                <div class="status-bar">
                    <div class="status">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">就绪 - 请先连接WebSocket</span>
                    </div>
                    <div class="status">
                        <span>帧数据: <span id="frameCount">0</span></span>
                    </div>
                </div>
                
                <div class="chart-wrapper">
                    <canvas id="pitchChart"></canvas>
                </div>
                
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-color ref"></span>
                        <span>参考音高</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color user"></span>
                        <span>用户音高</span>
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="control-panel">
                    <h3>🎮 控制区</h3>
                    <div class="controls">
                        <button id="btnConnectWs" class="btn-record-ref">
                            🔌 连接WebSocket
                        </button>
                        <button id="btnRecordRef" class="btn-record-ref" disabled>
                            🎙️ 录制参考音高
                        </button>
                        <button id="btnSing" class="btn-sing" disabled>
                            🎤 开始演唱
                        </button>
                        <button id="btnStop" class="btn-stop" disabled>
                            ⏹️ 停止
                        </button>
                        <button id="btnExport" class="btn-export">
                            📥 导出数据
                        </button>
                        <button id="btnClear" class="btn-clear">
                            🗑️ 清除所有数据
                        </button>
                    </div>
                    
                    <div class="ws-status" id="wsStatus">WebSocket状态: 未连接</div>
                </div>
                
                <div class="log-panel">
                    <div class="log-title">
                        <span>📋 实时帧数据</span>
                        <span style="font-size: 12px; color: #9ca3af;">显示最近20帧</span>
                    </div>
                    <table class="frame-log">
                        <thead>
                            <tr>
                                <th>帧号</th>
                                <th>时间(s)</th>
                                <th>参考音高(Hz)</th>
                                <th>用户音高(Hz)</th>
                                <th>偏差(音分)</th>
                                <th>评分</th>
                            </tr>
                        </thead>
                        <tbody id="logBody">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #666;">等待数据...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="data-panel">
                    <div class="data-title">📊 统计信息</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">总帧数</div>
                            <div class="stat-value" id="statTotalFrames">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">匹配率</div>
                            <div class="stat-value green" id="statMatchRate">0%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">平均偏差</div>
                            <div class="stat-value yellow" id="statAvgCents">0¢</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">综合评分</div>
                            <div class="stat-value red" id="statOverallScore">0</div>
                        </div>
                    </div>
                    
                    <div class="data-title" style="margin-top: 15px;">📝 原始数据预览</div>
                    <div class="data-preview" id="dataPreview">等待数据...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TARGET_SAMPLE_RATE = 16000;
        const BUFFER_SIZE = 1024;
        
        let audioContext = null;
        let microphone = null;
        let scriptProcessor = null;
        let isRecordingRef = false;
        let isSinging = false;
        
        let scores = [];
        let frameCount = 0;
        let audioFrameCount = 0;
        
        let chart = null;
        
        let ws = null;
        let wsConnected = false;
        
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                return;
            }
            
            const wsUrl = `ws://localhost:8000/ws/test_song`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                wsConnected = true;
                document.getElementById('wsStatus').textContent = 'WebSocket状态: ✅ 已连接';
                document.getElementById('statusDot').classList.add('ws-connected');
                document.getElementById('btnConnectWs').textContent = '🔌 已连接';
                document.getElementById('btnConnectWs').disabled = true;
                document.getElementById('btnRecordRef').disabled = false;
                document.getElementById('statusText').textContent = 'WebSocket已连接 - 请录制参考音高';
                console.log('WebSocket连接已建立');
            };
            
            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    
                    if (message.type === 'recording_status') {
                        const data = message.data;
                        if (isRecordingRef) {
                            const score = {
                                timestamp: data.timestamp || 0,
                                pitchScore: 0,
                                rhythmScore: 0,
                                overallScore: 0,
                                userPitch: data.pitch || 0,
                                refPitch: 0
                            };
                            scores.push(score);
                            frameCount++;
                            document.getElementById('frameCount').textContent = scores.length;
                            updateChart();
                            updateLog();
                            updateStats();
                        }
                    } else if (message.type === 'reference_recording_complete') {
                        console.log('参考音高录制完成:', message);
                        document.getElementById('btnSing').disabled = false;
                        document.getElementById('statusText').textContent = '参考音高录制完成 - 请开始演唱';
                    } else if (message.type === 'score') {
                        const data = message.data;
                        if (isSinging) {
                            const score = {
                                timestamp: data.timestamp || 0,
                                pitchScore: data.pitchScore || 0,
                                rhythmScore: data.rhythmScore || 0,
                                overallScore: data.overallScore || 0,
                                userPitch: data.userPitch || 0,
                                refPitch: data.refPitch || 0
                            };
                            scores.push(score);
                            frameCount++;
                            document.getElementById('frameCount').textContent = scores.length;
                            updateLog();
                            updateStats();
                            updateChart();
                        }
                    }
                } catch (error) {
                    console.error('解析WebSocket消息失败:', error);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket错误:', error);
                document.getElementById('wsStatus').textContent = 'WebSocket状态: ❌ 连接错误';
            };
            
            ws.onclose = () => {
                wsConnected = false;
                document.getElementById('wsStatus').textContent = 'WebSocket状态: ❌ 已断开';
                document.getElementById('statusDot').classList.remove('ws-connected');
                document.getElementById('btnConnectWs').textContent = '🔌 连接WebSocket';
                document.getElementById('btnConnectWs').disabled = false;
                document.getElementById('btnRecordRef').disabled = true;
                document.getElementById('btnSing').disabled = true;
                console.log('WebSocket连接已关闭');
            };
        }
        
        function updateChart() {
            if (!chart) return;
            
            const labels = scores.map(s => s.timestamp.toFixed(2));
            const refPitches = scores.map(s => s.refPitch > 0 ? s.refPitch : null);
            const userPitches = scores.map(s => s.userPitch > 0 ? s.userPitch : null);
            
            chart.data.labels = labels;
            chart.data.datasets[0].data = refPitches;
            chart.data.datasets[1].data = userPitches;
            
            chart.update('none');
        }
        
        function updateLog() {
            const tbody = document.getElementById('logBody');
            tbody.innerHTML = '';
            
            const displayData = scores.slice(-20).reverse();
            
            if (displayData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #666;">等待数据...</td></tr>';
                return;
            }
            
            for (const score of displayData) {
                const tr = document.createElement('tr');
                const centsDiff = score.refPitch > 0 && score.userPitch > 0 
                    ? 1200 * Math.log2(score.userPitch / score.refPitch) 
                    : 0;
                const absCents = Math.abs(centsDiff);
                const matchClass = absCents < 50 ? 'match' : absCents < 100 ? 'cents-diff' : 'mismatch';
                const matchText = absCents < 50 ? '✅' : absCents < 100 ? '⚠️' : '❌';
                
                tr.innerHTML = `
                    <td>${scores.indexOf(score)}</td>
                    <td>${score.timestamp.toFixed(3)}</td>
                    <td class="ref-pitch">${score.refPitch > 0 ? score.refPitch.toFixed(1) : '---'}</td>
                    <td class="user-pitch">${score.userPitch > 0 ? score.userPitch.toFixed(1) : '---'}</td>
                    <td class="${matchClass}">${absCents.toFixed(1)}¢</td>
                    <td>${score.overallScore.toFixed(1)}</td>
                `;
                tbody.appendChild(tr);
            }
        }
        
        function updateStats() {
            const totalFrames = scores.length;
            document.getElementById('statTotalFrames').textContent = totalFrames;
            
            let matched = 0;
            let totalCents = 0;
            let totalScore = 0;
            let count = 0;
            
            for (const score of scores) {
                if (score.refPitch > 0 && score.userPitch > 0) {
                    count++;
                    const centsDiff = 1200 * Math.log2(score.userPitch / score.refPitch);
                    totalCents += Math.abs(centsDiff);
                    if (Math.abs(centsDiff) < 50) {
                        matched++;
                    }
                }
                totalScore += score.overallScore;
            }
            
            const matchRate = count > 0 ? Math.round((matched / count) * 100) : 0;
            const avgCents = count > 0 ? Math.round(totalCents / count) : 0;
            const overallScore = totalFrames > 0 ? Math.round(totalScore / totalFrames) : 0;
            
            document.getElementById('statMatchRate').textContent = matchRate + '%';
            document.getElementById('statAvgCents').textContent = avgCents + '¢';
            document.getElementById('statOverallScore').textContent = overallScore;
            
            const previewData = JSON.stringify({
                frameCount: totalFrames,
                matchRate: matchRate + '%',
                avgCents: avgCents + '¢',
                overallScore: overallScore,
                sampleScores: scores.slice(-5).map(s => ({
                    t: s.timestamp.toFixed(3),
                    ref: s.refPitch.toFixed(1),
                    user: s.userPitch.toFixed(1),
                    score: s.overallScore.toFixed(1)
                }))
            }, null, 2);
            document.getElementById('dataPreview').textContent = previewData;
        }
        
        async function initAudioContext() {
            if (!audioContext) {
                audioContext = new AudioContext({ sampleRate: TARGET_SAMPLE_RATE });
                console.log(`AudioContext创建成功，采样率: ${audioContext.sampleRate}Hz`);
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            return audioContext;
        }
        
        async function setupAudioProcessing() {
            const ctx = await initAudioContext();
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: false,
                    autoGainControl: false,
                    noiseSuppression: false,
                    sampleRate: TARGET_SAMPLE_RATE
                }
            });
            
            microphone = ctx.createMediaStreamSource(stream);
            
            scriptProcessor = ctx.createScriptProcessor(BUFFER_SIZE, 1, 1);
            
            scriptProcessor.onaudioprocess = (event) => {
                if (!isRecordingRef && !isSinging) return;
                
                const inputData = event.inputBuffer.getChannelData(0);
                const float32Data = new Float32Array(inputData);
                
                audioFrameCount++;
                const currentTime = audioFrameCount * BUFFER_SIZE / TARGET_SAMPLE_RATE;
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'audio',
                        timestamp: currentTime,
                        data: Array.from(float32Data)
                    }));
                }
            };
            
            const silentGain = ctx.createGain();
            silentGain.gain.value = 0;
            
            microphone.connect(scriptProcessor);
            scriptProcessor.connect(silentGain);
            silentGain.connect(ctx.destination);
            
            console.log('音频处理链路已建立');
        }
        
        function cleanupAudio() {
            if (scriptProcessor) {
                scriptProcessor.disconnect();
                scriptProcessor = null;
            }
            if (microphone) {
                microphone.disconnect();
                microphone = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            audioFrameCount = 0;
        }
        
        async function startRecordingRef() {
            await setupAudioProcessing();
            
            isRecordingRef = true;
            isSinging = false;
            scores = [];
            frameCount = 0;
            audioFrameCount = 0;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'start_reference_recording',
                    timestamp: Date.now()
                }));
            }
            
            document.getElementById('btnRecordRef').classList.add('recording');
            document.getElementById('btnRecordRef').textContent = '⏸️ 录制中...';
            document.getElementById('btnRecordRef').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('statusDot').classList.add('recording');
            document.getElementById('statusText').textContent = '正在录制参考音高...';
            
            updateChart();
        }
        
        async function startSinging() {
            if (scores.length === 0) {
                alert('请先录制参考音高！');
                return;
            }
            
            await setupAudioProcessing();
            
            isRecordingRef = false;
            isSinging = true;
            frameCount = 0;
            audioFrameCount = 0;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'start_karaoke',
                    timestamp: Date.now()
                }));
            }
            
            document.getElementById('btnSing').classList.add('singing');
            document.getElementById('btnSing').textContent = '🎤 演唱中...';
            document.getElementById('btnSing').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('statusDot').classList.add('singing');
            document.getElementById('statusText').textContent = '正在演唱，音高对齐中...';
            
            updateChart();
        }
        
        function stop() {
            isRecordingRef = false;
            isSinging = false;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'stop_recording',
                    timestamp: Date.now()
                }));
            }
            
            cleanupAudio();
            
            document.getElementById('btnRecordRef').classList.remove('recording');
            document.getElementById('btnRecordRef').textContent = '🎙️ 录制参考音高';
            document.getElementById('btnRecordRef').disabled = false;
            document.getElementById('btnSing').classList.remove('singing');
            document.getElementById('btnSing').textContent = '🎤 开始演唱';
            document.getElementById('btnSing').disabled = scores.length === 0;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('statusDot').classList.remove('recording', 'singing');
            document.getElementById('statusDot').classList.add('ready');
            
            if (scores.length > 0) {
                document.getElementById('statusText').textContent = '测试完成 - 查看曲线对齐情况';
            } else {
                document.getElementById('statusText').textContent = '就绪 - 请先录制参考音高';
            }
        }
        
        function clearAll() {
            stop();
            scores = [];
            frameCount = 0;
            
            document.getElementById('frameCount').textContent = '0';
            document.getElementById('statusDot').classList.remove('ready');
            document.getElementById('statusText').textContent = '就绪 - 请先录制参考音高';
            document.getElementById('btnSing').disabled = true;
            
            updateLog();
            updateStats();
            updateChart();
        }
        
        function exportData() {
            const data = {
                timestamp: new Date().toISOString(),
                sampleRate: TARGET_SAMPLE_RATE,
                scores: scores,
                stats: {
                    frameCount: scores.length,
                    matchRate: document.getElementById('statMatchRate').textContent,
                    avgCents: document.getElementById('statAvgCents').textContent,
                    overallScore: document.getElementById('statOverallScore').textContent
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pitch_alignment_test_${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('数据导出成功！');
        }
